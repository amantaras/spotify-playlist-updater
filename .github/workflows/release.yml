name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Package site
        run: tar -czf playlist-studio-${{ github.ref_name }}.tar.gz -C dist .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" "playlist-studio-${GITHUB_REF_NAME}.tar.gz" --generate-notes --verify-tag